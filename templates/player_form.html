{% extends "base.html" %}
{% block title %}{% if player %}Rediģēt — {{ player.name }}{% else %}Jauns spēlētājs{% endif %}{% endblock %}

{% block content %}

<div class="container page-top">

  <a href="{{ url_for('players') }}" class="back-link">← Atpakaļ</a>

  <div class="form-card">
    <h1 class="form-title">
      {% if player %}✏ Rediģēt: {{ player.name }}{% else %}➕ Pievienot spēlētāju{% endif %}
    </h1>

    <form method="POST" class="player-form" novalidate>

      <div class="form-grid">

        <!-- Name -->
        <div class="form-group form-full">
          <label class="form-label" for="name">Vārds, Uzvārds <span class="required">*</span></label>
          <input type="text" id="name" name="name" class="form-input"
                 value="{{ player.name if player else '' }}"
                 placeholder="Piem. Harry Kane" required>
        </div>

        <!-- Nationality -->
        <div class="form-group">
          <label class="form-label" for="nationality">Valstpiederība <span class="required">*</span></label>
          <input type="text" id="nationality" name="nationality" class="form-input"
                 value="{{ player.nationality if player else '' }}"
                 placeholder="Piem. Anglija" required>
        </div>

        <!-- Position -->
        <div class="form-group">
          <label class="form-label" for="position">Pozīcija <span class="required">*</span></label>
          <select id="position" name="position" class="form-input" required>
            <option value="">— izvēlies —</option>
            {% for pos in ['Uzbrucējs', 'Pussargs', 'Aizsargs', 'Vārtsargs'] %}
              <option value="{{ pos }}" {% if player and player.position == pos %}selected{% endif %}>{{ pos }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Age -->
        <div class="form-group">
          <label class="form-label" for="age">Vecums</label>
          <input type="number" id="age" name="age" class="form-input"
                 value="{{ player.age if player else '' }}"
                 placeholder="25" min="14" max="50">
        </div>

        <!-- Height -->
        <div class="form-group">
          <label class="form-label" for="height_cm">Augums (cm)</label>
          <input type="number" id="height_cm" name="height_cm" class="form-input"
                 value="{{ player.height_cm if player else '' }}"
                 placeholder="180" min="140" max="220">
        </div>

        <!-- Market value -->
        <div class="form-group">
          <label class="form-label" for="market_value">Tirgus vērtība</label>
          <input type="text" id="market_value" name="market_value" class="form-input"
                 value="{{ player.market_value if player else '' }}"
                 placeholder="€50m">
        </div>

        <!-- Team -->
        <div class="form-group form-full">
          <label class="form-label" for="team_id">Komanda <span class="required">*</span></label>
          <select id="team_id" name="team_id" class="form-input" required>
            <option value="">— izvēlies komandu —</option>
            {% for t in teams %}
              <option value="{{ t.id }}"
                {% if player and player.team_id == t.id %}selected{% endif %}>
                [{{ t.short_code }}] {{ t.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Biography -->
        <div class="form-group form-full">
          <label class="form-label" for="biography">Biogrāfija</label>
          <textarea id="biography" name="biography" class="form-input form-textarea"
                    placeholder="Raksti par spēlētāja karjeru...">{{ player.biography if player else '' }}</textarea>
        </div>

      </div><!-- end form-grid -->

      <div class="form-footer">
        <a href="{{ url_for('players') }}" class="btn btn-ghost">Atcelt</a>
        <button type="submit" class="btn btn-primary">{{ action }}</button>
      </div>

    </form>
  </div>

</div>
{% endblock %}
